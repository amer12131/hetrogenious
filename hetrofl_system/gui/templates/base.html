<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HETROFL System{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    
    <!-- Modern CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Pro -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <!-- Chart.js for additional charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <!-- Three.js for 3D visualizations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    
    <style>
        /* Modern CSS Variables for Dark/Light Theme */
        :root {
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            
            /* Light Theme Colors */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* Brand Colors */
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-success: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            --gradient-warning: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            --gradient-danger: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            --gradient-info: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            --gradient-dark: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3), 0 4px 6px -4px rgb(0 0 0 / 0.3);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        /* Modern Sidebar */
        .modern-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: var(--gradient-dark);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-nav {
            padding: 1rem 0;
        }

        .nav-item {
            margin: 0.25rem 1rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateX(4px);
        }

        .nav-link i {
            width: 20px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-primary);
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Theme Toggle */
        .theme-toggle {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-online { background-color: var(--success); }
        .status-offline { background-color: var(--danger); }
        .status-training { background-color: var(--warning); }

        /* Modern Cards */
        .modern-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .modern-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Metric Cards */
        .metric-card {
            background: var(--gradient-primary);
            color: white;
            border-radius: 1rem;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .metric-card.success { background: var(--gradient-success); }
        .metric-card.warning { background: var(--gradient-warning); }
        .metric-card.danger { background: var(--gradient-danger); }
        .metric-card.info { background: var(--gradient-info); }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: var(--font-mono);
        }

        .metric-label {
            font-size: 0.875rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .metric-change {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Modern Buttons */
        .btn-modern {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 500;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        /* Plot Containers */
        .plot-container {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .modern-sidebar {
                transform: translateX(-100%);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .sidebar-open .modern-sidebar {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            
            .metric-value {
                font-size: 2rem;
            }
            
            .top-bar {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Loading States */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Modern Sidebar -->
    <div class="modern-sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="{{ url_for('index') }}" class="sidebar-brand">
                <i class="fas fa-network-wired"></i>
                HETROFL
            </a>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-item">
                <a href="{{ url_for('index') }}" class="nav-link" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    Dashboard
                </a>
            </div>
            <div class="nav-item">
                <a href="{{ url_for('models') }}" class="nav-link" data-page="models">
                    <i class="fas fa-brain"></i>
                    Models
                </a>
            </div>
            <div class="nav-item">
                <a href="{{ url_for('training') }}" class="nav-link" data-page="training">
                    <i class="fas fa-cogs"></i>
                    Training
                </a>
            </div>
            <div class="nav-item">
                <a href="{{ url_for('metrics') }}" class="nav-link" data-page="metrics">
                    <i class="fas fa-chart-line"></i>
                    Analytics
                </a>
            </div>
            
            <!-- Divider -->
            <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 1rem 1.5rem;"></div>
            
            <div class="nav-item">
                <a href="#" class="nav-link" onclick="generateReport()">
                    <i class="fas fa-file-alt"></i>
                    Reports
                </a>
            </div>
            <div class="nav-item">
                <a href="#" class="nav-link" onclick="showSystemMonitor()">
                    <i class="fas fa-server"></i>
                    System Monitor
                </a>
            </div>
            <div class="nav-item">
                <a href="#" class="nav-link" onclick="showSettings()">
                    <i class="fas fa-cog"></i>
                    Settings
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content Area -->
    <div class="main-content" id="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="theme-toggle d-lg-none" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </div>
            
            <div class="top-bar-actions">
                <!-- System Resources Mini Display -->
                <div class="status-indicator" id="system-resources" style="display: none;">
                    <i class="fas fa-microchip"></i>
                    <span id="cpu-usage">--</span>
                </div>
                
                <!-- Theme Toggle -->
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                
                <!-- Status Indicator -->
                <div class="status-indicator">
                    <div class="status-dot status-online" id="status-dot"></div>
                    <span id="status-text">Online</span>
                </div>
            </div>
        </div>

        <!-- Page Content -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 id="loading-text">Processing...</h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Enhanced JavaScript -->
    <script>
        // Modern HETROFL System JavaScript
        class HETROFLSystem {
            constructor() {
                this.socket = io();
                this.systemStatus = {
                    initialized: false,
                    training: false,
                    total_rounds: 0,
                    current_round: 0
                };
                this.theme = localStorage.getItem('hetrofl-theme') || 'dark';
                this.systemResources = {};
                
                this.initializeSystem();
                this.setupSocketHandlers();
                this.setupTheme();
                this.setupNavigation();
                this.startSystemMonitoring();
            }
            
            initializeSystem() {
                console.log('🚀 Initializing HETROFL System...');
                
                // Set initial theme
                document.documentElement.setAttribute('data-theme', this.theme);
                this.updateThemeIcon();
                
                // Add fade-in animations
                setTimeout(() => {
                    document.querySelectorAll('.modern-card, .metric-card').forEach(card => {
                        card.classList.add('fade-in');
                    });
                }, 100);
            }
            
            setupSocketHandlers() {
                this.socket.on('connect', () => {
                    console.log('✅ Connected to HETROFL server');
                    this.updateConnectionStatus(true);
                    this.socket.emit('request_update');
                });
                
                this.socket.on('disconnect', () => {
                    console.log('❌ Disconnected from server');
                    this.updateConnectionStatus(false);
                });
                
                // Enhanced batch update handler
                this.socket.on('batch_update', (data) => {
                    if (data.status) {
                        this.updateSystemStatus(data.status);
                    }
                    if (data.metrics && typeof updateMetrics === 'function') {
                        updateMetrics(data.metrics);
                    }
                    if (data.results && typeof updateResults === 'function') {
                        updateResults(data.results);
                    }
                });
                
                this.socket.on('error', (data) => {
                    this.showNotification('Error: ' + data.message, 'error');
                });
                
                // Request updates every 3 seconds
                setInterval(() => {
                    this.socket.emit('request_update');
                }, 3000);
            }
            
            setupTheme() {
                // Detect system theme preference
                if (!localStorage.getItem('hetrofl-theme')) {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    this.theme = prefersDark ? 'dark' : 'light';
                    localStorage.setItem('hetrofl-theme', this.theme);
                }
            }
            
            setupNavigation() {
                // Highlight active navigation item
                const currentPath = window.location.pathname;
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('href') === currentPath) {
                        link.classList.add('active');
                    }
                });
            }
            
            startSystemMonitoring() {
                // Monitor system resources
                setInterval(() => {
                    fetch('/api/system/resources')
                        .then(response => response.json())
                        .then(data => {
                            if (!data.error) {
                                this.systemResources = data;
                                this.updateSystemResourcesDisplay();
                            }
                        })
                        .catch(error => console.warn('System monitoring error:', error));
                }, 10000); // Every 10 seconds
            }
            
            updateSystemStatus(status) {
                this.systemStatus = status;
                
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                
                if (!statusDot || !statusText) return;
                
                if (status.error) {
                    statusDot.className = 'status-dot status-offline';
                    statusText.textContent = 'Error';
                } else if (status.training) {
                    statusDot.className = 'status-dot status-training';
                    statusText.textContent = `Training (${status.current_round}/${status.total_rounds})`;
                } else if (status.initialized) {
                    statusDot.className = 'status-dot status-online';
                    statusText.textContent = 'Ready';
                } else {
                    statusDot.className = 'status-dot status-offline';
                    statusText.textContent = 'Initializing';
                }
            }
            
            updateConnectionStatus(connected) {
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                
                if (!connected) {
                    statusDot.className = 'status-dot status-offline';
                    statusText.textContent = 'Disconnected';
                }
            }
            
            updateSystemResourcesDisplay() {
                const cpuUsage = document.getElementById('cpu-usage');
                const systemResourcesDiv = document.getElementById('system-resources');
                
                if (this.systemResources.cpu && cpuUsage) {
                    cpuUsage.textContent = `${this.systemResources.cpu.percent.toFixed(1)}%`;
                    systemResourcesDiv.style.display = 'flex';
                    
                    // Color code based on usage
                    if (this.systemResources.cpu.percent > 80) {
                        cpuUsage.style.color = 'var(--danger)';
                    } else if (this.systemResources.cpu.percent > 60) {
                        cpuUsage.style.color = 'var(--warning)';
                    } else {
                        cpuUsage.style.color = 'var(--success)';
                    }
                }
            }
            
            showNotification(message, type = 'info', duration = 5000) {
                const notification = document.createElement('div');
                notification.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
                notification.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
                notification.innerHTML = `
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                `;
                
                document.body.appendChild(notification);
                
                if (duration > 0) {
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.remove();
                        }
                    }, duration);
                }
            }
            
            updateThemeIcon() {
                const themeIcon = document.getElementById('theme-icon');
                if (themeIcon) {
                    themeIcon.className = this.theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                }
            }
        }
        
        // Global utility functions
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('hetrofl-theme', newTheme);
            
            if (window.hetroflSystem) {
                window.hetroflSystem.theme = newTheme;
                window.hetroflSystem.updateThemeIcon();
            }
            
            // Smooth transition
            document.body.style.transition = 'all 0.3s ease';
            setTimeout(() => {
                document.body.style.transition = '';
            }, 300);
        }
        
        function toggleSidebar() {
            document.body.classList.toggle('sidebar-open');
        }
        
        function generateReport() {
            if (window.hetroflSystem) {
                window.hetroflSystem.showNotification('Generating comprehensive report...', 'info');
            }
            
            fetch('/api/reports/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'summary' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    window.hetroflSystem?.showNotification('Error generating report: ' + data.error, 'error');
                } else {
                    // Show report in modal or new window
                    showReportModal(data);
                }
            })
            .catch(error => {
                console.error('Report generation error:', error);
                window.hetroflSystem?.showNotification('Failed to generate report', 'error');
            });
        }
        
        function showSystemMonitor() {
            // Show system monitoring modal
            window.hetroflSystem?.showNotification('Opening system monitor...', 'info');
            // Implementation for system monitor modal
        }
        
        function showSettings() {
            // Show settings modal
            window.hetroflSystem?.showNotification('Opening settings...', 'info');
            // Implementation for settings modal
        }
        
        function showReportModal(reportData) {
            // Create and show report modal
            const modal = document.createElement('div');
            modal.className = 'modal fade';
            modal.innerHTML = `
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Training Report</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <pre>${JSON.stringify(reportData, null, 2)}</pre>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            const bsModal = new bootstrap.Modal(modal);
            bsModal.show();
            
            modal.addEventListener('hidden.bs.modal', () => {
                modal.remove();
            });
        }
        
        // Utility functions
        function formatNumber(num, decimals = 2) {
            if (typeof num !== 'number') return 'N/A';
            return num.toFixed(decimals);
        }
        
        function formatPercentage(num, decimals = 1) {
            if (typeof num !== 'number') return 'N/A';
            return (num * 100).toFixed(decimals) + '%';
        }
        
        function formatTime(seconds) {
            if (typeof seconds !== 'number') return 'N/A';
            
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            
            if (hours > 0) {
                return `${hours}h ${minutes}m ${secs}s`;
            } else if (minutes > 0) {
                return `${minutes}m ${secs}s`;
            } else {
                return `${secs}s`;
            }
        }
        
        // Initialize system when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            window.hetroflSystem = new HETROFLSystem();
            
            // Initialize tooltips
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
            
            // Initialize page-specific functionality
            if (typeof initializeCharts === 'function') {
                setTimeout(initializeCharts, 100);
            }
            
            if (typeof loadInitialData === 'function') {
                setTimeout(loadInitialData, 200);
            }
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
